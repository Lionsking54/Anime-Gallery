<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Gallery Hub</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

h1{
  padding:20px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  opacity:0;
  transform:translateY(30px);
  animation:fadeIn 0.8s forwards;
}

@keyframes fadeIn{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.card img{
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:10px;
}

.title{
  display:block;
  margin:10px 0;
  font-size:22px;
  color:#60a5fa;
  cursor:pointer;
}

.title:hover{
  color:#93c5fd;
}

.download{
  display:inline-block;
  margin-top:8px;
  padding:8px 14px;
  background:#ff4d6d;
  color:white;
  text-decoration:none;
  border-radius:8px;
}

.download:hover{
  background:#ff1e4d;
}

/* hidden pages */
.page{
  display:none;
  padding:20px;
}

.back{
  display:inline-block;
  margin:20px;
  padding:10px 15px;
  background:#2563eb;
  color:white;
  text-decoration:none;
  border-radius:8px;
}
</style>
</head>

<body>
<audio id="bgMusic" loop>
    <source src="music/EEYUH! x Fluxxwave (Super Slowed).mp3" type="audio/mp3">
</audio>
<h1>Anime Wallpaper Hub</h1>

<!-- HOME -->
<div id="home" class="gallery">

  <div class="card">
    <img src="images/naruto.jpg">
    <span class="title" onclick="openPage('naruto')">Naruto</span>
    <a class="download" href="images/naruto.jpg" download>Download</a>
  </div>

  <div class="card">
    <img src="images/onepiece.jpg">
    <span class="title" onclick="openPage('onepiece')">One Piece</span>
    <a class="download" href="images/onepiece.jpg" download>Download</a>
  </div>

  <div class="card">
    <img src="images/demonslayer.jpg">
    <span class="title" onclick="openPage('demon')">Demon Slayer</span>
    <a class="download" href="images/demonslayer.jpg?v=2" download>Download</a>
  </div>

</div>

<!-- NARUTO PAGE -->
<div id="naruto" class="page">
  <h2>Naruto Wallpapers</h2>

  <div class="gallery">

    <div class="card">
      <img src="images/naruto1.jpg">
      <a class="download" href="images/naruto1.jpg" download>Download</a>
    </div>

    <div class="card">
      <img src="images/naruto2.jpg">
      <a class="download" href="images/naruto2.jpg" download>Download</a>
    </div>

    <div class="card">
      <img src="images/naruto3.jpg">
      <a class="download" href="images/naruto3.jpg" download>Download</a>
    </div>

  </div>

  <a class="back" onclick="goHome()">⬅ Back</a>
</div>

<!-- ONE PIECE PAGE -->
<div id="onepiece" class="page">
  <h2>One Piece Wallpapers</h2>

  <div class="gallery">

    <div class="card">
      <img src="images/op1.jpg">
      <a class="download" href="images/op1.jpg" download>Download</a>
    </div>

    <div class="card">
      <img src="images/op2.jpg">
      <a class="download" href="images/op2.jpg" download>Download</a>
    </div>

    <div class="card">
      <img src="images/op3.jpg">
      <a class="download" href="images/op3.jpg" download>Download</a>
    </div>

  </div>

  <a class="back" onclick="goHome()">⬅ Back</a>
</div>

<!-- DEMON SLAYER PAGE -->
<div id="demon" class="page">
  <h2>Demon Slayer Wallpapers</h2>

  <div class="gallery">

    <div class="card">
      <img src="images/demoayer.jpg">
      <a class="download" href="images/demonslyer.jpg" download>Download</a>
    </div>

    <div class="card">
      <img src="images/ds2.jpg">
      <a class="download" href="images/ds2.jpg" download>Download</a>
    </div>

    <div class="card">
      <img src="images/ds3.jpg">
      <a class="download" href="images/ds3.jpg" download>Download</a>
    </div>

  </div>

  <a class="back" onclick="goHome()">⬅ Back</a>
</div>

<script>
function openPage(id){
  document.getElementById("home").style.display="none";
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

function goHome(){
  document.getElementById("home").style.display="grid";
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
}

document.body.addEventListener("click", function(){

    document.getElementById("bgMusic").play();

}, { once:true });

</script>

</body>
</html>
