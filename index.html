<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Anime Wallpaper Hub</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:40px;
      font-size:45px;
    }

    h2{
      margin:40px 0 20px;
      color:#60a5fa;
      text-align:center;
      font-size:35px;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
    }

    .card{
      background:#1e293b;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 0 15px rgba(0,0,0,0.4);

      /* Fade In Animation */
      opacity:0;
      transform:translateY(40px);
      animation:fadeIn 1s forwards;
    }

    .card:nth-child(2){
      animation-delay:0.3s;
    }

    .card:nth-child(3){
      animation-delay:0.6s;
    }

    @keyframes fadeIn{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .card img{
      width:100%;
      height:350px;
      object-fit:cover;
    }

    .content{
      padding:15px;
      text-align:center;
    }

    .anime-title{
      font-size:25px;
      color:#60a5fa;
      cursor:pointer;
      transition:0.3s;
      margin-bottom:15px;
      display:block;
    }

    .anime-title:hover{
      color:#93c5fd;
      transform:scale(1.05);
    }

    .download-btn{
      display:inline-block;
      margin-top:10px;
      padding:10px 18px;
      background:#ff4d6d;
      color:white;
      text-decoration:none;
      border-radius:8px;
      transition:0.3s;
    }

    .download-btn:hover{
      background:#ff1e4d;
    }

    /* Hidden Sections */

    .anime-section{
      display:none;
      margin-top:40px;
    }

    .anime-images{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .anime-images img{
      width:100%;
      height:300px;
      object-fit:cover;
      border-radius:12px;
      transition:0.3s;
    }

    .anime-images img:hover{
      transform:scale(1.03);
    }

    .back-btn{
      display:block;
      width:150px;
      margin:20px auto;
      text-align:center;
      padding:12px;
      background:#2563eb;
      color:white;
      text-decoration:none;
      border-radius:10px;
    }

  </style>
</head>

<body>

  <h1>Anime Wallpaper Hub</h1>

  <!-- MAIN PAGE -->

  <div id="home" class="gallery">

    <!-- Naruto -->
    <div class="card">

      <img src="images/naruto.jpg" alt="Naruto">

      <div class="content">

        <span 
          class="anime-title"
          onclick="showSection('naruto-section')">
          Naruto
        </span>

        <a 
          href="images/naruto.jpg"
          download
          class="download-btn">
          Download
        </a>

      </div>

    </div>

    <!-- One Piece -->
    <div class="card">

      <img src="images/onepiece.jpg" alt="One Piece">

      <div class="content">

        <span 
          class="anime-title"
          onclick="showSection('onepiece-section')">
          One Piece
        </span>

        <a 
          href="images/onepiece.jpg"
          download
          class="download-btn">
          Download
        </a>

      </div>

    </div>

    <!-- Demon Slayer -->
    <div class="card">

      <img src="images/demonslayer.jpg" alt="Demon Slayer">

      <div class="content">

        <span 
          class="anime-title"
          onclick="showSection('demonslayer-section')">
          Demon Slayer
        </span>

        <a 
          href="images/demonslayer.jpg"
          download
          class="download-btn">
          Download
        </a>

      </div>

    </div>

  </div>

  <!-- NARUTO SECTION -->

  <div id="naruto-section" class="anime-section">

    <h2>Naruto Wallpapers</h2>

    <div class="anime-images">

      <img src="images/naruto1.jpg">
      <img src="images/naruto2.jpg">
      <img src="images/naruto3.jpg">

    </div>

    <a href="#" class="back-btn" onclick="goHome()">Back Home</a>

  </div>

  <!-- ONE PIECE SECTION -->

  <div id="onepiece-section" class="anime-section">

    <h2>One Piece Wallpapers</h2>

    <div class="anime-images">

      <img src="images/op1.jpg">
      <img src="images/op2.jpg">
      <img src="images/op3.jpg">

    </div>

    <a href="#" class="back-btn" onclick="goHome()">Back Home</a>

  </div>

  <!-- DEMON SLAYER SECTION -->

  <div id="demonslayer-section" class="anime-section">

    <h2>Demon Slayer Wallpapers</h2>

    <div class="anime-images">

      <img src="images/ds1.jpg">
      <img src="images/ds2.jpg">
      <img src="images/ds3.jpg">

    </div>

    <a href="#" class="back-btn" onclick="goHome()">Back Home</a>

  </div>

  <script>

    function showSection(sectionId){

      document.getElementById("home").style.display = "none";

      document.querySelectorAll(".anime-section").forEach(section => {
        section.style.display = "none";
      });

      document.getElementById(sectionId).style.display = "block";
    }

    function goHome(){

      document.getElementById("home").style.display = "grid";

      document.querySelectorAll(".anime-section").forEach(section => {
        section.style.display = "none";
      });
    }

  </script>

</body>
</html>
